<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HaloCall</title>
<script src="/socket.io/socket.io.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap');

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root {
  --bg:#0b0b12;
  --bg2:#13131f;
  --bg3:#1c1c2e;
  --accent:#7c6cfc;
  --accent-h:#6b5ce0;
  --accent2:#a78bfa;
  --green:#22d3a5;
  --red:#f87171;
  --amber:#fbbf24;
  --text:#f0eeff;
  --muted:#7b7a9e;
  --border:rgba(124,108,252,0.18);
  --r:14px;
}

body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); height:100vh; overflow:hidden; display:flex; flex-direction:column; }

/* ── LOBBY ── */
#lobby {
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  min-height:100vh; padding:1.5rem;
  background: radial-gradient(ellipse 90% 60% at 50% -10%, rgba(124,108,252,0.18) 0%, transparent 65%);
}

.logo { font-family:'Syne',sans-serif; font-size:2.6rem; font-weight:800; letter-spacing:-1.5px; }
.logo span { color:var(--accent2); }
.tagline { color:var(--muted); font-size:.95rem; margin:.3rem 0 2.5rem; font-weight:300; }

.card {
  background:var(--bg2); border:1px solid var(--border); border-radius:var(--r);
  padding:1.75rem; width:100%; max-width:400px;
}

.preview-box {
  width:100%; aspect-ratio:4/3; background:var(--bg3); border-radius:10px;
  overflow:hidden; margin-bottom:1.25rem; position:relative;
  display:flex; align-items:center; justify-content:center;
}
.preview-box video { width:100%; height:100%; object-fit:cover; transform:scaleX(-1); }
.no-cam-msg { color:var(--muted); font-size:.85rem; display:flex; flex-direction:column; align-items:center; gap:.5rem; }

input.field {
  width:100%; background:var(--bg3); border:1px solid var(--border);
  border-radius:9px; padding:.7rem 1rem; color:var(--text);
  font-family:'DM Sans',sans-serif; font-size:1rem; outline:none;
  transition:border-color .2s; margin-bottom:.75rem;
}
input.field:focus { border-color:var(--accent); }
input.field::placeholder { color:var(--muted); }

.btn {
  width:100%; padding:.8rem; border-radius:9px; border:none; cursor:pointer;
  font-family:'Syne',sans-serif; font-size:.95rem; font-weight:600;
  display:flex; align-items:center; justify-content:center; gap:.5rem;
  transition:all .18s;
}
.btn:active{transform:scale(.97)}
.btn-primary { background:var(--accent); color:#fff; margin-bottom:.6rem; }
.btn-primary:hover { background:var(--accent-h); }
.btn-outline { background:transparent; color:var(--text); border:1px solid var(--border); }
.btn-outline:hover { background:var(--bg3); }

.divider { display:flex; align-items:center; gap:.6rem; margin:.75rem 0; color:var(--muted); font-size:.78rem; }
.divider::before,.divider::after { content:''; flex:1; height:1px; background:var(--border); }

.join-row { display:flex; gap:.5rem; }
.join-row input { flex:1; margin-bottom:0; text-transform:uppercase; letter-spacing:2px; font-size:.85rem; }
.join-row .btn { width:auto; padding:.7rem 1.1rem; white-space:nowrap; flex-shrink:0; }

.err-msg { background:rgba(248,113,113,.1); border:1px solid rgba(248,113,113,.3); border-radius:9px; padding:.65rem 1rem; color:var(--red); font-size:.82rem; text-align:center; margin-top:.75rem; display:none; }

/* ── ROOM ── */
#room { display:none; flex-direction:column; height:100vh; }

.room-bar {
  display:flex; align-items:center; justify-content:space-between;
  padding:.65rem 1.25rem; background:var(--bg2); border-bottom:1px solid var(--border);
  flex-shrink:0; gap:.75rem;
}
.room-logo { font-family:'Syne',sans-serif; font-weight:700; font-size:1rem; flex-shrink:0; }
.room-logo span { color:var(--accent2); }

.room-pill {
  background:var(--bg3); border:1px solid var(--border); border-radius:999px;
  padding:.35rem .9rem; font-size:.78rem; display:flex; align-items:center; gap:.45rem;
  cursor:pointer; transition:background .2s; letter-spacing:1px;
}
.room-pill:hover { background:var(--accent); }
.room-pill .lbl { color:var(--muted); font-size:.7rem; }

.live-dot { width:7px; height:7px; background:var(--green); border-radius:50%; animation:blink 2s infinite; flex-shrink:0; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }
.peer-count { font-size:.82rem; color:var(--muted); display:flex; align-items:center; gap:.4rem; flex-shrink:0; }

/* ── VIDEO GRID ── */
.grid-wrap { flex:1; display:grid; gap:6px; padding:6px; overflow:hidden; }
.grid-wrap.g1 { grid-template-columns:1fr; }
.grid-wrap.g2 { grid-template-columns:1fr 1fr; }
.grid-wrap.g3 { grid-template-columns:1fr 1fr; grid-template-rows:1fr 1fr; }
.grid-wrap.g4 { grid-template-columns:1fr 1fr; grid-template-rows:1fr 1fr; }

/* screen share layout: screen takes 2/3, others stack */
.grid-wrap.sharing { grid-template-columns:2fr 1fr; grid-template-rows:1fr; }
.grid-wrap.sharing .tile-screen { grid-row:1; grid-column:1; }
.grid-wrap.sharing .tile-cam-col { grid-column:2; display:flex; flex-direction:column; gap:6px; overflow:hidden; }

.tile {
  background:var(--bg2); border-radius:10px; overflow:hidden; position:relative;
  border:1px solid var(--border); min-height:0;
}
.tile video { width:100%; height:100%; object-fit:cover; display:block; }
.tile.local-tile video { transform:scaleX(-1); }
.tile.cam-off video { display:none; }

.tile-avatar {
  position:absolute; inset:0; display:none;
  align-items:center; justify-content:center; flex-direction:column; gap:.4rem;
}
.tile.cam-off .tile-avatar { display:flex; }
.av-circle {
  width:60px; height:60px; border-radius:50%; display:flex; align-items:center;
  justify-content:center; font-family:'Syne',sans-serif; font-size:1.5rem; font-weight:700;
}
.av-name { color:var(--muted); font-size:.78rem; }

.tile-label {
  position:absolute; bottom:8px; left:8px; background:rgba(0,0,0,.6);
  backdrop-filter:blur(4px); padding:2px 9px; border-radius:999px;
  font-size:.73rem; display:flex; align-items:center; gap:5px;
}

.tile-badges {
  position:absolute; top:8px; right:8px; display:flex; gap:4px;
}
.badge {
  width:24px; height:24px; border-radius:50%; background:rgba(0,0,0,.6);
  display:none; align-items:center; justify-content:center;
}
.badge.show { display:flex; }
.badge svg { width:12px; height:12px; }

.tile-sharing-label {
  position:absolute; top:8px; left:8px; background:var(--accent);
  padding:2px 10px; border-radius:999px; font-size:.7rem; font-weight:600;
  display:none;
}
.tile.is-screen .tile-sharing-label { display:block; }
.tile.is-screen { border-color:rgba(124,108,252,.5); }

/* ── CONTROLS ── */
.controls {
  display:flex; align-items:center; justify-content:center; gap:.75rem;
  padding:.85rem 1rem; background:var(--bg2); border-top:1px solid var(--border);
  flex-shrink:0;
}

.c-btn {
  width:48px; height:48px; border-radius:50%; border:none; cursor:pointer;
  display:flex; align-items:center; justify-content:center; transition:all .18s;
  background:var(--bg3); color:var(--text);
}
.c-btn:hover { background:var(--bg); transform:scale(1.06); }
.c-btn:active { transform:scale(.95); }
.c-btn.off { background:rgba(248,113,113,.15); color:var(--red); border:1px solid rgba(248,113,113,.3); }
.c-btn.on-screen { background:rgba(124,108,252,.2); color:var(--accent2); border:1px solid rgba(124,108,252,.4); }
.c-btn.end { background:var(--red); color:#fff; width:56px; height:56px; }
.c-btn.end:hover { background:#ef4444; }

svg.ic { width:19px; height:19px; fill:none; stroke:currentColor; stroke-width:1.8; stroke-linecap:round; stroke-linejoin:round; }

/* ── TOAST ── */
.toast {
  position:fixed; bottom:90px; left:50%; transform:translateX(-50%) translateY(14px);
  background:var(--bg2); border:1px solid var(--border); border-radius:999px;
  padding:.5rem 1.1rem; font-size:.82rem; opacity:0; transition:all .25s; z-index:99; white-space:nowrap;
}
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

/* screen share notification bar */
.share-banner {
  background:rgba(124,108,252,.12); border-bottom:1px solid rgba(124,108,252,.25);
  padding:.4rem 1rem; text-align:center; font-size:.8rem; color:var(--accent2);
  display:none; flex-shrink:0;
}
.share-banner.show { display:block; }

@media(max-width:600px){
  .grid-wrap.sharing { grid-template-columns:1fr; grid-template-rows:2fr 1fr; }
  .grid-wrap.sharing .tile-screen { grid-column:1; grid-row:1; }
  .grid-wrap.sharing .tile-cam-col { grid-column:1; grid-row:2; flex-direction:row; }
  .controls { gap:.5rem; }
  .c-btn { width:42px; height:42px; }
  .c-btn.end { width:50px; height:50px; }
}
</style>
</head>
<body>

<!-- LOBBY -->
<div id="lobby">
  <h1 class="logo">Halo<span>Call</span></h1>
  <p class="tagline">Video call + screen share, langsung dari browser</p>
  <div class="card">
    <div class="preview-box">
      <video id="preview-vid" autoplay muted playsinline></video>
      <div class="no-cam-msg" id="no-cam" style="display:none">
        <svg class="ic" viewBox="0 0 24 24"><path d="M23 7l-7 5 7 5V7z"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>
        Kamera tidak ditemukan
      </div>
    </div>
    <input class="field" id="my-name" placeholder="Nama kamu..." maxlength="20"/>
    <button class="btn btn-primary" onclick="createRoom()">
      <svg class="ic" viewBox="0 0 24 24"><path d="M23 7l-7 5 7 5V7z"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>
      Buat Room Baru
    </button>
    <div class="divider">atau masukkan kode</div>
    <div class="join-row">
      <input class="field" id="room-input" placeholder="KODE ROOM" maxlength="6" oninput="this.value=this.value.toUpperCase()"/>
      <button class="btn btn-outline" onclick="joinRoom()">Gabung</button>
    </div>
    <div class="err-msg" id="err-msg"></div>
  </div>
</div>

<!-- ROOM -->
<div id="room">
  <div class="room-bar">
    <div class="room-logo">Halo<span>Call</span></div>
    <div class="room-pill" onclick="copyCode()" title="Klik untuk salin kode">
      <span class="lbl">KODE</span>
      <span id="room-code-display">—</span>
      <svg class="ic" style="width:12px;height:12px" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
    </div>
    <div class="peer-count"><div class="live-dot"></div><span id="peer-count-txt">1 orang</span></div>
  </div>

  <div class="share-banner" id="share-banner">📺 Kamu sedang berbagi layar — klik "Stop Share" untuk berhenti</div>

  <div class="grid-wrap g1" id="grid"></div>

  <div class="controls">
    <button class="c-btn" id="mic-btn" onclick="toggleMic()" title="Mic">
      <svg class="ic" id="mic-ico" viewBox="0 0 24 24"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
    </button>
    <button class="c-btn" id="cam-btn" onclick="toggleCam()" title="Kamera">
      <svg class="ic" id="cam-ico" viewBox="0 0 24 24"><path d="M23 7l-7 5 7 5V7z"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>
    </button>
    <button class="c-btn" id="share-btn" onclick="toggleScreen()" title="Share Screen">
      <svg class="ic" viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
    </button>
    <button class="c-btn end" onclick="endCall()" title="Akhiri panggilan">
      <svg class="ic" style="width:21px;height:21px" viewBox="0 0 24 24"><path d="M10.68 13.31a16 16 0 0 0 3.41 2.6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7 2 2 0 0 1 1.72 2v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07C9.44 17.29 7.76 15.37 6.07 13a19.79 19.79 0 0 1-3.07-8.63A2 2 0 0 1 4.18 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91"/><line x1="23" y1="1" x2="1" y2="23"/></svg>
    </button>
    <button class="c-btn" onclick="copyCode()" title="Bagikan kode">
      <svg class="ic" viewBox="0 0 24 24"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
    </button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── CONFIG ──
const ICE_SERVERS = [
  { urls: 'stun:stun.l.google.com:19302' },
  { urls: 'stun:stun1.l.google.com:19302' }
];

const COLORS = ['#7c6cfc','#22d3a5','#f87171','#fbbf24'];
let colorIdx = 0;

// ── STATE ──
let socket, myId, roomCode, myName;
let localStream, screenStream;
let peers = {};        // peerId -> { pc, name, color, camOn, micOn, sharing }
let tileMap = {};      // peerId -> tile element
let micOn = true, camOn = true, isSharing = false;

// ── MEDIA ──
async function initMedia() {
  try {
    localStream = await navigator.mediaDevices.getUserMedia({ video:true, audio:true });
    document.getElementById('preview-vid').srcObject = localStream;
  } catch(e) {
    document.getElementById('no-cam').style.display = 'flex';
    document.getElementById('preview-vid').style.display = 'none';
    try { localStream = await navigator.mediaDevices.getUserMedia({ audio:true }); }
    catch(e2) { localStream = new MediaStream(); }
  }
}

// ── LOBBY ──
async function createRoom() {
  myName = document.getElementById('my-name').value.trim() || 'Kamu';
  if (!localStream) await initMedia();
  connectSocket(() => {
    socket.emit('join-room', { roomId: genCode(), name: myName });
  });
}

async function joinRoom() {
  const code = document.getElementById('room-input').value.trim().toUpperCase();
  if (code.length !== 6) { showErr('Kode room harus 6 karakter'); return; }
  myName = document.getElementById('my-name').value.trim() || 'Kamu';
  if (!localStream) await initMedia();
  connectSocket(() => {
    socket.emit('join-room', { roomId: code, name: myName });
  });
}

function genCode() {
  return Math.random().toString(36).substring(2,8).toUpperCase();
}

// ── SOCKET ──
function connectSocket(onOpen) {
  socket = io();
  socket.on('connect', () => { myId = socket.id; onOpen(); });

  socket.on('room-full', () => showErr('Room sudah penuh (maks 4 orang)'));

  socket.on('room-joined', ({ peerId, peers: existingPeers, roomId }) => {
    myId = peerId;
    roomCode = roomId || document.getElementById('room-input').value.trim().toUpperCase() || '??????';
    enterRoom();
    existingPeers.forEach(p => createPeerConnection(p.id, p.name, p.camOn, true));
  });

  socket.on('peer-joined', ({ id, name, camOn, micOn }) => {
    createPeerConnection(id, name, camOn, false);
  });

  socket.on('offer', async ({ from, offer }) => {
    const pc = peers[from]?.pc;
    if (!pc) return;
    await pc.setRemoteDescription(offer);
    const answer = await pc.createAnswer();
    await pc.setLocalDescription(answer);
    socket.emit('answer', { to: from, answer });
  });

  socket.on('answer', async ({ from, answer }) => {
    await peers[from]?.pc.setRemoteDescription(answer);
  });

  socket.on('ice-candidate', ({ from, candidate }) => {
    peers[from]?.pc.addIceCandidate(candidate).catch(()=>{});
  });

  socket.on('peer-cam-toggle', ({ id, camOn }) => {
    if (peers[id]) peers[id].camOn = camOn;
    updateTileCam(id, camOn);
  });

  socket.on('peer-mic-toggle', ({ id, micOn }) => {
    if (peers[id]) peers[id].micOn = micOn;
    const badge = tileMap[id]?.querySelector('.badge-mic');
    if (badge) badge.classList.toggle('show', !micOn);
  });

  socket.on('peer-screen-share-start', ({ id }) => {
    if (peers[id]) peers[id].sharing = true;
    const tile = tileMap[id];
    if (tile) tile.classList.add('is-screen');
    relayout();
  });

  socket.on('peer-screen-share-stop', ({ id }) => {
    if (peers[id]) peers[id].sharing = false;
    const tile = tileMap[id];
    if (tile) tile.classList.remove('is-screen');
    relayout();
  });

  socket.on('peer-left', ({ id }) => {
    closePeer(id);
  });
}

// ── WebRTC ──
function createPeerConnection(peerId, peerName, peerCamOn, isInitiator) {
  const color = COLORS[colorIdx++ % COLORS.length];
  const pc = new RTCPeerConnection({ iceServers: ICE_SERVERS });
  peers[peerId] = { pc, name: peerName, color, camOn: peerCamOn ?? true, micOn: true, sharing: false };

  // Add local tracks
  localStream.getTracks().forEach(t => pc.addTrack(t, localStream));

  // ICE
  pc.onicecandidate = ({ candidate }) => {
    if (candidate) socket.emit('ice-candidate', { to: peerId, candidate });
  };

  // Remote stream
  pc.ontrack = ({ streams }) => {
    const tile = tileMap[peerId];
    if (tile) {
      const vid = tile.querySelector('video.remote-vid');
      if (vid && streams[0]) { vid.srcObject = streams[0]; vid.play().catch(()=>{}); }
    }
  };

  addTile(peerId, peerName, color, peerCamOn);

  if (isInitiator) {
    pc.onnegotiationneeded = async () => {
      const offer = await pc.createOffer();
      await pc.setLocalDescription(offer);
      socket.emit('offer', { to: peerId, offer });
    };
  }

  return pc;
}

function closePeer(peerId) {
  peers[peerId]?.pc.close();
  delete peers[peerId];
  tileMap[peerId]?.remove();
  delete tileMap[peerId];
  relayout();
}

// ── TILES ──
function addLocalTile() {
  const tile = makeTile('local', myName + ' (Kamu)', '#7c6cfc', true, true);
  tile.classList.add('local-tile');
  const vid = tile.querySelector('video.remote-vid');
  vid.classList.add('local-vid');
  vid.muted = true;
  if (localStream) { vid.srcObject = localStream; vid.play().catch(()=>{}); }
  document.getElementById('grid').appendChild(tile);
  tileMap['local'] = tile;
}

function addTile(peerId, name, color, camOn) {
  const tile = makeTile(peerId, name, color, camOn, true);
  document.getElementById('grid').appendChild(tile);
  tileMap[peerId] = tile;
  relayout();
}

function makeTile(id, name, color, camOn, hasVideo) {
  const tile = document.createElement('div');
  tile.className = 'tile' + (camOn ? '' : ' cam-off');
  tile.dataset.peer = id;

  const initials = name ? name.charAt(0).toUpperCase() : '?';
  tile.innerHTML = `
    <video class="remote-vid" autoplay playsinline></video>
    <div class="tile-avatar">
      <div class="av-circle" style="background:${color}">${initials}</div>
      <span class="av-name">${name}</span>
    </div>
    <div class="tile-label">
      <span style="width:6px;height:6px;background:${color};border-radius:50%;flex-shrink:0"></span>
      <span>${name}</span>
    </div>
    <div class="tile-badges">
      <div class="badge badge-mic">
        <svg class="ic" style="stroke:#f87171" viewBox="0 0 24 24"><line x1="1" y1="1" x2="23" y2="23"/><path d="M9 9v3a3 3 0 0 0 5.12 2.12M15 9.34V4a3 3 0 0 0-5.94-.6"/><path d="M17 16.95A7 7 0 0 1 5 12v-2m14 0v2a7 7 0 0 1-.11 1.23"/></svg>
      </div>
    </div>
    <div class="tile-sharing-label">Layarmu</div>
  `;
  return tile;
}

function updateTileCam(peerId, on) {
  const tile = tileMap[peerId];
  if (!tile) return;
  tile.classList.toggle('cam-off', !on);
}

// ── ROOM ──
function enterRoom() {
  document.getElementById('lobby').style.display = 'none';
  document.getElementById('room').style.display = 'flex';
  document.getElementById('room-code-display').textContent = roomCode;
  addLocalTile();
  updateCount();
}

function relayout() {
  const grid = document.getElementById('grid');
  const tiles = grid.querySelectorAll('.tile');
  const n = tiles.length;
  const anySharing = [...Object.values(peers)].some(p => p.sharing) || isSharing;

  if (anySharing) {
    // Screen share layout
    grid.className = 'grid-wrap sharing';
    // Move screen tile first visually (CSS handles via classes)
    tiles.forEach(t => {
      if (t.classList.contains('is-screen')) t.classList.add('tile-screen');
      else t.classList.remove('tile-screen');
    });
  } else {
    grid.className = 'grid-wrap g' + Math.min(n, 4);
  }
  updateCount();
}

function updateCount() {
  const n = Object.keys(peers).length + 1;
  document.getElementById('peer-count-txt').textContent = n + ' orang';
}

// ── CONTROLS ──
function toggleMic() {
  micOn = !micOn;
  localStream.getAudioTracks().forEach(t => t.enabled = micOn);
  socket.emit('toggle-mic', { micOn });
  document.getElementById('mic-btn').classList.toggle('off', !micOn);
  document.getElementById('mic-ico').innerHTML = micOn
    ? `<path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/>`
    : `<line x1="1" y1="1" x2="23" y2="23"/><path d="M9 9v3a3 3 0 0 0 5.12 2.12M15 9.34V4a3 3 0 0 0-5.94-.6"/><path d="M17 16.95A7 7 0 0 1 5 12v-2m14 0v2a7 7 0 0 1-.11 1.23"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/>`;
  showToast(micOn ? '🎙 Mikrofon hidup' : '🔇 Mikrofon mati');
}

function toggleCam() {
  camOn = !camOn;
  localStream.getVideoTracks().forEach(t => t.enabled = camOn);
  socket.emit('toggle-cam', { camOn });
  updateTileCam('local', camOn);
  document.getElementById('cam-btn').classList.toggle('off', !camOn);
  showToast(camOn ? '📷 Kamera hidup' : '📷 Kamera mati');
}

async function toggleScreen() {
  if (isSharing) {
    stopScreen();
    return;
  }
  try {
    screenStream = await navigator.mediaDevices.getDisplayMedia({ video:true, audio:true });
    isSharing = true;

    // Replace video track in all peer connections
    const screenTrack = screenStream.getVideoTracks()[0];
    Object.values(peers).forEach(({ pc }) => {
      const sender = pc.getSenders().find(s => s.track?.kind === 'video');
      if (sender) sender.replaceTrack(screenTrack);
    });

    // Show local tile as screen share
    const localTile = tileMap['local'];
    if (localTile) {
      localTile.classList.add('is-screen');
      const vid = localTile.querySelector('video');
      vid.srcObject = new MediaStream([screenTrack, ...localStream.getAudioTracks()]);
      vid.play().catch(()=>{});
    }

    document.getElementById('share-btn').classList.add('on-screen');
    document.getElementById('share-banner').classList.add('show');
    socket.emit('screen-share-start');
    relayout();
    showToast('📺 Mulai berbagi layar');

    screenTrack.onended = () => stopScreen();
  } catch(e) {
    if (e.name !== 'NotAllowedError') showToast('Gagal membuka screen share');
  }
}

function stopScreen() {
  if (!isSharing) return;
  isSharing = false;
  screenStream?.getTracks().forEach(t => t.stop());

  // Restore camera track
  const camTrack = localStream.getVideoTracks()[0];
  Object.values(peers).forEach(({ pc }) => {
    const sender = pc.getSenders().find(s => s.track?.kind === 'video');
    if (sender && camTrack) sender.replaceTrack(camTrack);
  });

  const localTile = tileMap['local'];
  if (localTile) {
    localTile.classList.remove('is-screen');
    const vid = localTile.querySelector('video');
    vid.srcObject = localStream;
    vid.play().catch(()=>{});
  }

  document.getElementById('share-btn').classList.remove('on-screen');
  document.getElementById('share-banner').classList.remove('show');
  socket.emit('screen-share-stop');
  relayout();
  showToast('📺 Berhenti berbagi layar');
}

function endCall() {
  stopScreen();
  socket?.disconnect();
  window.location.reload();
}

function copyCode() {
  navigator.clipboard.writeText(roomCode).then(() => {
    showToast('✅ Kode "' + roomCode + '" disalin — bagikan ke teman!');
  }).catch(() => showToast('Kode room: ' + roomCode));
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._t);
  t._t = setTimeout(() => t.classList.remove('show'), 3000);
}

function showErr(msg) {
  const e = document.getElementById('err-msg');
  e.textContent = msg;
  e.style.display = 'block';
  setTimeout(() => e.style.display = 'none', 4000);
}

// Init on load
initMedia();

// Patch: server needs to echo back roomId on join-room
// Handled by storing code client-side
socket?.on('room-joined', ({ roomId }) => {
  if (roomId) roomCode = roomId;
});
</script>
