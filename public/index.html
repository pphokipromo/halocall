<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>HaloCall</title>
<script src="/socket.io/socket.io.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap');

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}

:root {
  --bg:#0b0b12;
  --bg2:#13131f;
  --bg3:#1c1c2e;
  --accent:#7c6cfc;
  --accent-h:#6b5ce0;
  --accent2:#a78bfa;
  --green:#22d3a5;
  --red:#f87171;
  --text:#f0eeff;
  --muted:#7b7a9e;
  --border:rgba(124,108,252,0.18);
  --r:16px;
  --ctrl-h: 80px;
}

html, body {
  font-family:'DM Sans',sans-serif;
  background:var(--bg);
  color:var(--text);
  height:100%;
  width:100%;
  overflow:hidden;
  position:fixed;
  top:0; left:0;
}

/* ════════════════ LOBBY ════════════════ */
#lobby {
  display:flex; flex-direction:column; align-items:center;
  height:100%; width:100%; overflow-y:auto;
  padding: 1.5rem 1.1rem 2rem;
  background: radial-gradient(ellipse 130% 45% at 50% 0%, rgba(124,108,252,0.22) 0%, transparent 55%);
}

.logo { font-family:'Syne',sans-serif; font-size:2rem; font-weight:800; letter-spacing:-1px; text-align:center; margin-top:.5rem; }
.logo span { color:var(--accent2); }
.tagline { color:var(--muted); font-size:.82rem; margin:.2rem 0 1.25rem; text-align:center; }

.card {
  background:var(--bg2); border:1px solid var(--border); border-radius:var(--r);
  padding:1.1rem; width:100%; max-width:440px;
}

.preview-box {
  width:100%; aspect-ratio:4/3; background:var(--bg3); border-radius:11px;
  overflow:hidden; margin-bottom:.9rem; position:relative;
  display:flex; align-items:center; justify-content:center;
}
.preview-box video { width:100%; height:100%; object-fit:cover; transform:scaleX(-1); }
.no-cam-msg { color:var(--muted); font-size:.8rem; display:flex; flex-direction:column; align-items:center; gap:.4rem; text-align:center; padding:1rem; }

input.field {
  width:100%; background:var(--bg3); border:1px solid var(--border);
  border-radius:12px; padding:.8rem 1rem; color:var(--text);
  font-family:'DM Sans',sans-serif; font-size:1rem; outline:none;
  transition:border-color .2s; margin-bottom:.65rem;
  -webkit-appearance:none; appearance:none;
}
input.field:focus { border-color:var(--accent); }
input.field::placeholder { color:var(--muted); }

.btn {
  width:100%; padding:.85rem; border-radius:13px; border:none; cursor:pointer;
  font-family:'Syne',sans-serif; font-size:.95rem; font-weight:700;
  display:flex; align-items:center; justify-content:center; gap:.5rem;
  transition:all .12s; -webkit-appearance:none; touch-action:manipulation;
}
.btn:active { transform:scale(.96); }
.btn-primary { background:var(--accent); color:#fff; margin-bottom:.6rem; }
.btn-outline { background:transparent; color:var(--text); border:1px solid var(--border); }
.btn-outline:active { background:var(--bg3); }

.divider { display:flex; align-items:center; gap:.5rem; margin:.5rem 0; color:var(--muted); font-size:.75rem; }
.divider::before,.divider::after { content:''; flex:1; height:1px; background:var(--border); }

.join-row { display:flex; gap:.45rem; }
.join-row input { flex:1; margin-bottom:0; text-transform:uppercase; letter-spacing:3px; font-size:.88rem; text-align:center; }
.join-row .btn { width:auto; padding:.8rem 1rem; flex-shrink:0; border-radius:11px; font-size:.88rem; }

.err-msg {
  background:rgba(248,113,113,.1); border:1px solid rgba(248,113,113,.3);
  border-radius:10px; padding:.55rem .9rem; color:var(--red);
  font-size:.8rem; text-align:center; margin-top:.6rem; display:none;
}

/* ════════════════ ROOM ════════════════ */
#room { display:none; flex-direction:column; height:100%; width:100%; }

.room-bar {
  display:flex; align-items:center; justify-content:space-between;
  padding:.55rem .9rem;
  padding-top:calc(.55rem + env(safe-area-inset-top, 0px));
  background:var(--bg2); border-bottom:1px solid var(--border);
  flex-shrink:0; gap:.5rem; z-index:10;
}
.room-logo { font-family:'Syne',sans-serif; font-weight:800; font-size:.95rem; flex-shrink:0; }
.room-logo span { color:var(--accent2); }

.room-pill {
  background:var(--bg3); border:1px solid var(--border); border-radius:999px;
  padding:.3rem .8rem; font-size:.75rem; display:flex; align-items:center; gap:.35rem;
  cursor:pointer; touch-action:manipulation; letter-spacing:1.5px;
  flex:1; justify-content:center; max-width:155px;
}
.room-pill:active { background:var(--accent); }
.lbl { color:var(--muted); font-size:.62rem; }

.live-dot { width:6px; height:6px; background:var(--green); border-radius:50%; animation:blink 2s infinite; flex-shrink:0; }
@keyframes blink { 0%,100%{opacity:1}50%{opacity:.3} }
.peer-count { font-size:.75rem; color:var(--muted); display:flex; align-items:center; gap:.3rem; flex-shrink:0; }

.share-banner {
  background:rgba(124,108,252,.12); border-bottom:1px solid rgba(124,108,252,.25);
  padding:.3rem .9rem; text-align:center; font-size:.72rem; color:var(--accent2);
  display:none; flex-shrink:0;
}
.share-banner.show { display:block; }

/* ════════════════ VIDEO GRID ════════════════ */
.grid-wrap {
  flex:1; display:grid; gap:4px; padding:4px;
  overflow:hidden; min-height:0;
}

/* portrait mobile: stack vertically for 2 people so faces are bigger */
.grid-wrap.g1 { grid-template-columns:1fr; }
.grid-wrap.g2 { grid-template-rows:1fr 1fr; grid-template-columns:1fr; }
.grid-wrap.g3 { grid-template-columns:1fr 1fr; grid-template-rows:1fr 1fr; }
.grid-wrap.g4 { grid-template-columns:1fr 1fr; grid-template-rows:1fr 1fr; }

/* landscape override */
@media(orientation:landscape) {
  .grid-wrap.g2 { grid-template-columns:1fr 1fr; grid-template-rows:1fr; }
  .grid-wrap.g3 { grid-template-columns:1fr 1fr 1fr; grid-template-rows:1fr; }
}

/* screen share: big on top, cams below as row */
.grid-wrap.sharing { grid-template-rows:2fr 1fr; grid-template-columns:1fr; }
.cam-strip { display:flex; gap:4px; overflow:hidden; }
.cam-strip .tile { flex:1; }

.tile {
  background:var(--bg3); border-radius:10px; overflow:hidden; position:relative;
  border:1px solid var(--border); min-height:0;
}
/* FIX: video must fill tile completely */
.tile video {
  position:absolute; inset:0;
  width:100%; height:100%;
  object-fit:cover;
  display:block;
}
.tile.local-tile video { transform:scaleX(-1); }

/* avatar shown when cam off OR stream not yet arrived */
.tile-avatar {
  position:absolute; inset:0; z-index:1;
  display:flex; align-items:center; justify-content:center; flex-direction:column; gap:.35rem;
  background:var(--bg3);
  transition:opacity .3s;
}
.tile-avatar.hidden { opacity:0; pointer-events:none; }

.av-circle {
  width:54px; height:54px; border-radius:50%; display:flex; align-items:center;
  justify-content:center; font-family:'Syne',sans-serif; font-size:1.35rem; font-weight:800;
}
.av-name { color:var(--muted); font-size:.7rem; max-width:80px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }

.tile-label {
  position:absolute; bottom:6px; left:7px; z-index:2;
  background:rgba(0,0,0,.6); backdrop-filter:blur(4px);
  padding:2px 7px; border-radius:999px;
  font-size:.65rem; display:flex; align-items:center; gap:4px;
}
.badge-mic {
  position:absolute; top:6px; right:6px; z-index:2;
  width:20px; height:20px; border-radius:50%;
  background:rgba(248,113,113,.85); display:none; align-items:center; justify-content:center;
}
.badge-mic.show { display:flex; }
.tile-sharing-label {
  position:absolute; top:6px; left:6px; z-index:2;
  background:var(--accent); padding:2px 7px; border-radius:999px;
  font-size:.62rem; font-weight:700; display:none;
}
.tile.is-screen .tile-sharing-label { display:block; }
.tile.is-screen { border-color:rgba(124,108,252,.6); }

/* ════════════════ CONTROLS ════════════════ */
.controls {
  display:flex; align-items:center; justify-content:space-around;
  padding:.6rem .5rem;
  padding-bottom:calc(.6rem + env(safe-area-inset-bottom, 0px));
  background:var(--bg2); border-top:1px solid var(--border);
  flex-shrink:0;
}

.c-btn {
  display:flex; flex-direction:column; align-items:center; gap:3px;
  width:56px; height:56px; border-radius:50%; border:none; cursor:pointer;
  justify-content:center;
  transition:all .12s; background:var(--bg3); color:var(--text);
  touch-action:manipulation; -webkit-appearance:none; flex-shrink:0;
}
.c-btn:active { transform:scale(.88); }
.c-btn span { font-size:.58rem; color:var(--muted); font-family:'DM Sans',sans-serif; }
.c-btn.off { background:rgba(248,113,113,.15); color:var(--red); border:1px solid rgba(248,113,113,.35); }
.c-btn.off span { color:var(--red); }
.c-btn.on-screen { background:rgba(124,108,252,.2); color:var(--accent2); border:1px solid rgba(124,108,252,.4); }
.c-btn.on-screen span { color:var(--accent2); }
.c-btn.end { background:var(--red); color:#fff; }
.c-btn.end span { color:rgba(255,255,255,.8); }

svg.ic { width:20px; height:20px; fill:none; stroke:currentColor; stroke-width:1.8; stroke-linecap:round; stroke-linejoin:round; flex-shrink:0; }

/* ════════════════ TOAST ════════════════ */
.toast {
  position:fixed; bottom:calc(86px + env(safe-area-inset-bottom, 0px)); left:50%;
  transform:translateX(-50%) translateY(8px);
  background:var(--bg2); border:1px solid var(--border); border-radius:999px;
  padding:.45rem 1rem; font-size:.78rem; opacity:0; transition:all .2s;
  z-index:200; white-space:nowrap; pointer-events:none; max-width:90vw;
  overflow:hidden; text-overflow:ellipsis;
}
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>

<!-- ══ LOBBY ══ -->
<div id="lobby">
  <h1 class="logo">Halo<span>Call</span></h1>
  <p class="tagline">Video call + screen share, gratis & langsung dari browser</p>
  <div class="card">
    <div class="preview-box">
      <video id="preview-vid" autoplay muted playsinline></video>
      <div class="no-cam-msg" id="no-cam" style="display:none">
        <svg class="ic" viewBox="0 0 24 24"><path d="M23 7l-7 5 7 5V7z"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>
        <span>Izinkan akses kamera &amp; mikrofon di browser</span>
      </div>
    </div>
    <input class="field" id="my-name" placeholder="Nama kamu..." maxlength="20" autocomplete="off"/>
    <button class="btn btn-primary" onclick="createRoom()">
      <svg class="ic" viewBox="0 0 24 24"><path d="M23 7l-7 5 7 5V7z"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>
      Buat Room Baru
    </button>
    <div class="divider">atau gabung dengan kode</div>
    <div class="join-row">
      <input class="field" id="room-input" placeholder="KODE ROOM" maxlength="6"
        oninput="this.value=this.value.toUpperCase()" autocomplete="off" inputmode="text"/>
      <button class="btn btn-outline" onclick="joinRoom()">Gabung</button>
    </div>
    <div class="err-msg" id="err-msg"></div>
  </div>
</div>

<!-- ══ ROOM ══ -->
<div id="room">
  <div class="room-bar">
    <div class="room-logo">Halo<span>Call</span></div>
    <div class="room-pill" onclick="copyCode()">
      <span class="lbl">KODE</span>
      <span id="room-code-display">—</span>
      <svg class="ic" style="width:11px;height:11px" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
    </div>
    <div class="peer-count"><div class="live-dot"></div><span id="peer-count-txt">1 orang</span></div>
  </div>

  <div class="share-banner" id="share-banner">📺 Sedang berbagi layar — tap Stop untuk berhenti</div>

  <div class="grid-wrap g1" id="grid"></div>

  <div class="controls">
    <button class="c-btn" id="mic-btn" onclick="toggleMic()">
      <svg class="ic" id="mic-ico" viewBox="0 0 24 24">
        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
        <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
        <line x1="12" y1="19" x2="12" y2="23"/>
        <line x1="8" y1="23" x2="16" y2="23"/>
      </svg>
      <span id="mic-lbl">Mic</span>
    </button>

    <button class="c-btn" id="cam-btn" onclick="toggleCam()">
      <svg class="ic" id="cam-ico" viewBox="0 0 24 24">
        <path d="M23 7l-7 5 7 5V7z"/>
        <rect x="1" y="5" width="15" height="14" rx="2"/>
      </svg>
      <span id="cam-lbl">Kamera</span>
    </button>

    <button class="c-btn end" onclick="endCall()">
      <svg class="ic" style="width:22px;height:22px" viewBox="0 0 24 24">
        <path d="M10.68 13.31a16 16 0 0 0 3.41 2.6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7 2 2 0 0 1 1.72 2v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07C9.44 17.29 7.76 15.37 6.07 13a19.79 19.79 0 0 1-3.07-8.63A2 2 0 0 1 4.18 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91"/>
        <line x1="23" y1="1" x2="1" y2="23"/>
      </svg>
      <span>Keluar</span>
    </button>

    <button class="c-btn" id="share-btn" onclick="toggleScreen()">
      <svg class="ic" viewBox="0 0 24 24">
        <rect x="2" y="3" width="20" height="14" rx="2"/>
        <path d="M8 21h8M12 17v4"/>
      </svg>
      <span id="share-lbl">Share</span>
    </button>

    <button class="c-btn" onclick="copyCode()">
      <svg class="ic" viewBox="0 0 24 24">
        <circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/>
        <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/>
        <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
      </svg>
      <span>Bagikan</span>
    </button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ══════════════════════════════════════
//  CONFIG
// ══════════════════════════════════════
const ICE = [
  { urls:'stun:stun.l.google.com:19302' },
  { urls:'stun:stun1.l.google.com:19302' },
  { urls:'stun:stun2.l.google.com:19302' },
  { urls:'stun:stun3.l.google.com:19302' }
];
const COLORS = ['#7c6cfc','#22d3a5','#f87171','#fbbf24'];
let colorIdx = 0;

// ══════════════════════════════════════
//  STATE
// ══════════════════════════════════════
let socket, myId, roomCode, myName;
let localStream, screenStream;
let peers   = {};   // peerId → { pc, remoteStream, name, color, camOn, micOn }
let tileMap = {};   // peerId → tile DOM element
let micOn = true, camOn = true, isSharing = false;

// ══════════════════════════════════════
//  MEDIA INIT
// ══════════════════════════════════════
async function initMedia() {
  try {
    localStream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode:'user', width:{ideal:1280}, height:{ideal:720} },
      audio: { echoCancellation:true, noiseSuppression:true }
    });
    const prev = document.getElementById('preview-vid');
    prev.srcObject = localStream;
    prev.style.display = 'block';
    document.getElementById('no-cam').style.display = 'none';
  } catch(e) {
    console.warn('Camera/mic error:', e);
    document.getElementById('no-cam').style.display = 'flex';
    document.getElementById('preview-vid').style.display = 'none';
    // try audio only
    try { localStream = await navigator.mediaDevices.getUserMedia({ audio:true }); }
    catch(e2) { localStream = new MediaStream(); }
  }
}

// ══════════════════════════════════════
//  LOBBY ACTIONS
// ══════════════════════════════════════
async function createRoom() {
  myName = document.getElementById('my-name').value.trim() || 'Kamu';
  if (!localStream) await initMedia();
  connectSocket(() => socket.emit('join-room', { roomId: genCode(), name: myName }));
}

async function joinRoom() {
  const code = document.getElementById('room-input').value.trim().toUpperCase();
  if (code.length !== 6) { showErr('Kode harus 6 karakter'); return; }
  myName = document.getElementById('my-name').value.trim() || 'Kamu';
  if (!localStream) await initMedia();
  connectSocket(() => socket.emit('join-room', { roomId: code, name: myName }));
}

function genCode() { return Math.random().toString(36).substring(2,8).toUpperCase(); }

// ══════════════════════════════════════
//  SOCKET
// ══════════════════════════════════════
function connectSocket(onOpen) {
  socket = io({ transports:['websocket'] });

  socket.on('connect', () => { myId = socket.id; onOpen(); });
  socket.on('room-full', () => showErr('Room sudah penuh (maks 4 orang)'));

  socket.on('room-joined', ({ peerId, peers: existing, roomId }) => {
    myId = peerId;
    roomCode = roomId;
    enterRoom();
    // Existing peers: WE are the caller (initiator)
    existing.forEach(p => initPC(p.id, p.name, p.camOn ?? true, true));
  });

  socket.on('peer-joined', ({ id, name, camOn }) => {
    // New peer joined: THEY will call us, we are non-initiator
    initPC(id, name, camOn ?? true, false);
  });

  // ── WebRTC signaling ──
  socket.on('offer', async ({ from, offer }) => {
    let p = peers[from];
    if (!p) {
      // Peer joined before our room-joined propagated — create PC now
      p = initPC(from, '...', true, false);
    }
    await p.pc.setRemoteDescription(new RTCSessionDescription(offer));
    const answer = await p.pc.createAnswer();
    await p.pc.setLocalDescription(answer);
    socket.emit('answer', { to: from, answer });
  });

  socket.on('answer', async ({ from, answer }) => {
    const p = peers[from];
    if (p) await p.pc.setRemoteDescription(new RTCSessionDescription(answer));
  });

  socket.on('ice-candidate', ({ from, candidate }) => {
    const p = peers[from];
    if (p && candidate) p.pc.addIceCandidate(new RTCIceCandidate(candidate)).catch(()=>{});
  });

  // ── Peer state ──
  socket.on('peer-cam-toggle',  ({ id, camOn })  => { if(peers[id]) peers[id].camOn=camOn; setTileCam(id, camOn); });
  socket.on('peer-mic-toggle',  ({ id, micOn })  => { const b=tileMap[id]?.querySelector('.badge-mic'); if(b) b.classList.toggle('show',!micOn); });
  socket.on('peer-screen-share-start', ({ id }) => { if(peers[id]) peers[id].sharing=true;  tileMap[id]?.classList.add('is-screen');    relayout(); });
  socket.on('peer-screen-share-stop',  ({ id }) => { if(peers[id]) peers[id].sharing=false; tileMap[id]?.classList.remove('is-screen'); relayout(); });
  socket.on('peer-left', ({ id }) => closePeer(id));
}

// ══════════════════════════════════════
//  WebRTC PEER CONNECTION
// ══════════════════════════════════════
function initPC(peerId, peerName, peerCamOn, isInitiator) {
  if (peers[peerId]) return peers[peerId]; // already exists

  const color = COLORS[colorIdx++ % COLORS.length];
  const pc = new RTCPeerConnection({ iceServers: ICE, iceCandidatePoolSize: 10 });

  peers[peerId] = { pc, name: peerName, color, camOn: peerCamOn, micOn: true, sharing: false };

  // ── Add ALL local tracks so remote can receive them ──
  if (localStream) {
    localStream.getTracks().forEach(track => {
      pc.addTrack(track, localStream);
    });
  }

  // ── ICE ──
  pc.onicecandidate = ({ candidate }) => {
    if (candidate) socket.emit('ice-candidate', { to: peerId, candidate });
  };

  pc.oniceconnectionstatechange = () => {
    console.log(`[${peerId}] ICE:`, pc.iceConnectionState);
  };

  // ── THE KEY FIX: ontrack ──
  pc.ontrack = (event) => {
    console.log(`[${peerId}] ontrack`, event.track.kind, event.streams);
    const tile = tileMap[peerId];
    if (!tile) return;

    // Always use streams[0] if available, otherwise build from track
    const stream = event.streams && event.streams[0]
      ? event.streams[0]
      : (() => { const s = new MediaStream(); s.addTrack(event.track); return s; })();

    peers[peerId].remoteStream = stream;

    const vid = tile.querySelector('video');
    vid.srcObject = stream;

    // Force play — important on mobile
    const tryPlay = () => {
      vid.play().then(() => {
        // Hide avatar once video is actually playing
        const avatar = tile.querySelector('.tile-avatar');
        if (avatar && !peers[peerId]?.camOff) avatar.classList.add('hidden');
      }).catch(err => {
        console.warn('play() failed, retrying...', err);
        setTimeout(tryPlay, 500);
      });
    };

    vid.onloadedmetadata = tryPlay;
    tryPlay();
  };

  // Create tile
  addTile(peerId, peerName, color, peerCamOn);

  // ── Initiate call if we are the caller ──
  if (isInitiator) {
    pc.onnegotiationneeded = async () => {
      try {
        const offer = await pc.createOffer({ offerToReceiveAudio:true, offerToReceiveVideo:true });
        await pc.setLocalDescription(offer);
        socket.emit('offer', { to: peerId, offer });
      } catch(e) { console.error('offer error', e); }
    };
  }

  return peers[peerId];
}

function closePeer(peerId) {
  peers[peerId]?.pc.close();
  delete peers[peerId];
  tileMap[peerId]?.remove();
  delete tileMap[peerId];
  relayout();
}

// ══════════════════════════════════════
//  TILE / DOM
// ══════════════════════════════════════
function addLocalTile() {
  const tile = makeTile('local', myName + ' (Kamu)', '#7c6cfc');
  tile.classList.add('local-tile');
  const vid = tile.querySelector('video');
  vid.muted = true; // prevent echo
  if (localStream) {
    vid.srcObject = localStream;
    vid.play().catch(()=>{});
    // Show video, hide avatar
    tile.querySelector('.tile-avatar').classList.add('hidden');
  }
  document.getElementById('grid').appendChild(tile);
  tileMap['local'] = tile;
}

function addTile(peerId, name, color, camOn) {
  if (tileMap[peerId]) return; // already exists
  const tile = makeTile(peerId, name, color);
  document.getElementById('grid').appendChild(tile);
  tileMap[peerId] = tile;
  if (!camOn) setTileCam(peerId, false);
  relayout();
}

function makeTile(id, name, color) {
  const tile = document.createElement('div');
  tile.className = 'tile';
  tile.dataset.peer = id;
  const init = (name || '?').charAt(0).toUpperCase();
  tile.innerHTML = `
    <video autoplay playsinline></video>
    <div class="tile-avatar">
      <div class="av-circle" style="background:${color}">${init}</div>
      <span class="av-name">${name}</span>
    </div>
    <div class="tile-label">
      <span style="width:5px;height:5px;background:${color};border-radius:50%;flex-shrink:0"></span>
      <span>${name}</span>
    </div>
    <div class="badge-mic">
      <svg style="width:10px;height:10px;fill:none;stroke:#fff;stroke-width:2.2;stroke-linecap:round" viewBox="0 0 24 24">
        <line x1="1" y1="1" x2="23" y2="23"/>
        <path d="M9 9v3a3 3 0 0 0 5.12 2.12M15 9.34V4a3 3 0 0 0-5.94-.6"/>
      </svg>
    </div>
    <div class="tile-sharing-label">Layar</div>
  `;
  return tile;
}

function setTileCam(peerId, on) {
  const tile = tileMap[peerId]; if (!tile) return;
  const avatar = tile.querySelector('.tile-avatar');
  if (on) { avatar.classList.add('hidden'); }
  else    { avatar.classList.remove('hidden'); }
}

// ══════════════════════════════════════
//  ROOM ENTER & LAYOUT
// ══════════════════════════════════════
function enterRoom() {
  document.getElementById('lobby').style.display = 'none';
  const roomEl = document.getElementById('room');
  roomEl.style.display = 'flex';
  document.getElementById('room-code-display').textContent = roomCode;
  addLocalTile();
  relayout();
}

function relayout() {
  const grid = document.getElementById('grid');
  const n = grid.querySelectorAll('.tile').length;
  const anySharing = isSharing || Object.values(peers).some(p => p.sharing);
  grid.className = 'grid-wrap ' + (anySharing ? 'sharing' : 'g' + Math.min(n, 4));
  document.getElementById('peer-count-txt').textContent = (Object.keys(peers).length + 1) + ' orang';
}

// ══════════════════════════════════════
//  CONTROLS
// ══════════════════════════════════════
function toggleMic() {
  micOn = !micOn;
  localStream?.getAudioTracks().forEach(t => t.enabled = micOn);
  socket?.emit('toggle-mic', { micOn });
  document.getElementById('mic-btn').classList.toggle('off', !micOn);
  document.getElementById('mic-lbl').textContent = micOn ? 'Mic' : 'Mute';
  document.getElementById('mic-ico').innerHTML = micOn
    ? `<path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/>`
    : `<line x1="1" y1="1" x2="23" y2="23"/><path d="M9 9v3a3 3 0 0 0 5.12 2.12M15 9.34V4a3 3 0 0 0-5.94-.6"/><path d="M17 16.95A7 7 0 0 1 5 12v-2m14 0v2a7 7 0 0 1-.11 1.23"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/>`;
}

function toggleCam() {
  camOn = !camOn;
  localStream?.getVideoTracks().forEach(t => t.enabled = camOn);
  socket?.emit('toggle-cam', { camOn });
  setTileCam('local', camOn);
  document.getElementById('cam-btn').classList.toggle('off', !camOn);
  document.getElementById('cam-lbl').textContent = camOn ? 'Kamera' : 'Mati';
}

async function toggleScreen() {
  if (isSharing) { stopScreen(); return; }
  try {
    screenStream = await navigator.mediaDevices.getDisplayMedia({ video:true, audio:true });
    isSharing = true;
    const screenTrack = screenStream.getVideoTracks()[0];

    // Replace video sender on all connections
    Object.values(peers).forEach(({ pc }) => {
      const sender = pc.getSenders().find(s => s.track?.kind === 'video');
      if (sender) sender.replaceTrack(screenTrack);
    });

    // Update local tile
    const localTile = tileMap['local'];
    if (localTile) {
      localTile.classList.add('is-screen');
      const vid = localTile.querySelector('video');
      const s = new MediaStream([screenTrack]);
      vid.srcObject = s;
      vid.play().catch(()=>{});
    }

    document.getElementById('share-btn').classList.add('on-screen');
    document.getElementById('share-lbl').textContent = 'Stop';
    document.getElementById('share-banner').classList.add('show');
    socket.emit('screen-share-start');
    relayout();

    screenTrack.onended = () => stopScreen();
    showToast('📺 Berbagi layar dimulai');
  } catch(e) {
    if (e.name !== 'NotAllowedError') showToast('Gagal share screen');
  }
}

function stopScreen() {
  if (!isSharing) return;
  isSharing = false;
  screenStream?.getTracks().forEach(t => t.stop());

  // Restore camera track
  const camTrack = localStream?.getVideoTracks()[0];
  Object.values(peers).forEach(({ pc }) => {
    const sender = pc.getSenders().find(s => s.track?.kind === 'video');
    if (sender && camTrack) sender.replaceTrack(camTrack);
  });

  const localTile = tileMap['local'];
  if (localTile) {
    localTile.classList.remove('is-screen');
    const vid = localTile.querySelector('video');
    vid.srcObject = localStream;
    vid.play().catch(()=>{});
  }

  document.getElementById('share-btn').classList.remove('on-screen');
  document.getElementById('share-lbl').textContent = 'Share';
  document.getElementById('share-banner').classList.remove('show');
  socket.emit('screen-share-stop');
  relayout();
  showToast('📺 Berhenti berbagi layar');
}

function endCall() {
  stopScreen();
  socket?.disconnect();
  window.location.reload();
}

function copyCode() {
  const url = window.location.origin + '?room=' + roomCode;
  navigator.clipboard.writeText(url)
    .then(() => showToast('✅ Link disalin — bagikan ke teman!'))
    .catch(() => { navigator.clipboard.writeText(roomCode); showToast('Kode: ' + roomCode); });
}

// ══════════════════════════════════════
//  HELPERS
// ══════════════════════════════════════
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(t._t); t._t = setTimeout(() => t.classList.remove('show'), 3000);
}
function showErr(msg) {
  const e = document.getElementById('err-msg');
  e.textContent = msg; e.style.display = 'block';
  setTimeout(() => e.style.display = 'none', 4000);
}

// Auto-fill room code from URL ?room=XXXXXX
const urlRoom = new URLSearchParams(location.search).get('room');
if (urlRoom) document.getElementById('room-input').value = urlRoom.toUpperCase();

// Init camera preview on load
initMedia();
</script>
